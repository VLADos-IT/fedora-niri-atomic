name: fedora-laptop-niri
description: Minimal Fedora bootc for Intel laptop with Niri + Noctalia
base-image: quay.io/fedora/fedora-bootc
image-version: 44

modules:
  - type: copy
    src:  config/certs/cosign.pub
    dest: /etc/pki/containers/cosign.pub

  - type: copy
    src:  config/containers/registries.d/ghcr.yaml
    dest: /etc/containers/registries.d/ghcr.yaml

  - type: signing

  - type: dnf
    repos:
      cleanup: true
      copr:
        - yalter/niri
        - zhangyi6324/noctalia-shell
        - brycensranch/gpu-screen-recorder-git
    install:
      skip-unavailable: true
      packages:
        - niri
        - noctalia-shell
        - xwayland-run
        - alacritty
        - nautilus
        - flatpak
        - neovim

        - xdg-desktop-portal
        - xdg-desktop-portal-gtk
        - greetd
        - cage
        - gtkgreet
        
        - iwlwifi-mvm-firmware
        - alsa-sof-firmware
        - alsa-ucm

        - gvfs-mtp

        - wget
        - git
        - mtr
        - rsync
        - wpa_supplicant
        - NetworkManager-wifi

        - glibc-langpack-en
        - glibc-langpack-ru
        - google-noto-sans-vf-fonts
        - google-noto-sans-mono-vf-fonts
        - google-noto-serif-vf-fonts
        - google-noto-color-emoji-fonts
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - nano
        - waybar
        - swaybg
        - swayidle
        - swaylock
        - polkit-kde
        - polkit-kde-agent-1
        - polkit-qt6-1
        - nano-default-editor

        - cups
        - cups-browsed
        - cups-client
        - cups-filters
        - cups-filters-driverless
        - hplip
        - sane-airscan
        - sane-backends

        - plymouth
        - plymouth-system-theme

        - hunspell
        - hunspell-en
        - hunspell-en-GB
        - hunspell-en-US
        - osinfo-db
        - osinfo-db-tools
        - tesseract-common
        - tesseract-langpack-eng

        - glibc-all-langpacks
