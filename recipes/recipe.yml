        - usbmuxd
        - wsdd
        - unbound

  - type: script
    snippets:
      - |
        mkdir -p /etc/greetd
        cat > /etc/greetd/config.toml <<'EOF'
        [terminal]
        vt = 1

        [default_session]
        command = "cage -ds -m last -- gtkgreet -c niri"
        user = "_greetd"
        EOF

      - |
        cat > /etc/locale.conf <<'EOF'
        LANG=en_US.UTF-8
        LC_CTYPE=en_US.UTF-8
        EOF